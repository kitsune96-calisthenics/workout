document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"02759600-9751-4a08-bc9e-e06d844829ac\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black\">\n<meta name=\"apple-mobile-web-app-title\" content=\"Entreno Marga\">\n<meta name=\"theme-color\" content=\"#0b0b0d\">\n<title>Entreno Marga<\u002Ftitle>\n\n<style>\n  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}\n  html,body{margin:0}\n  body{background:#0b0b0d}\n  input,button,textarea{font-family:inherit}\n  input[type=number]{-moz-appearance:textfield}\n  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}\n  ::placeholder{color:#56564f}\n  ::-webkit-scrollbar{width:0;height:0}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#0b0b0d;display:flex;justify-content:center;font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif\">\n  <div style=\"width:100%;max-width:460px;min-height:100vh;background:#0b0b0d;display:flex;flex-direction:column;position:relative\">\n\n    <div style=\"padding:16px 16px 12px;background:#0b0b0d;border-bottom:1px solid #161619\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center\">\n        <div style=\"font:700 11px/1 ui-monospace,monospace;letter-spacing:.16em;color:#8b8b86\">ENTRENO · MARGA<\u002Fdiv>\n        <div style=\"font:700 10.5px/1 ui-monospace,monospace;letter-spacing:.1em;color:#19e3b1\">{{ headerBadge }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:11px;font-size:27px;font-weight:600;color:#f4f4f2;letter-spacing:-0.02em\">{{ headerTitle }}<\u002Fdiv>\n      <div style=\"margin-top:2px;font-size:13px;color:#8b8b86\">{{ headerSub }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;overflow-y:auto;padding:4px 16px 28px\">\n\n      <sc-if value=\"{{ viewTrain }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <div style=\"display:flex;gap:9px;margin:14px 0 6px;overflow-x:auto;padding-bottom:4px\">\n            <sc-for list=\"{{ routineCards }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ c.onTap }}\" style=\"{{ c.cardStyle }}\">\n                <span style=\"{{ c.shortStyle }}\">{{ c.short }}<\u002Fspan>\n                <span style=\"flex:1;display:flex;align-items:center;font-size:12.5px;font-weight:600;color:#f4f4f2;line-height:1.2;text-wrap:balance;padding:5px 0\">{{ c.name }}<\u002Fspan>\n                <span style=\"font:500 10px/1 ui-monospace,monospace;color:#8b8b86\">{{ c.count }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ hasRoutine }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <div style=\"padding:14px;background:#141417;border:1px solid #232328;border-radius:16px;margin:10px 0 14px\">\n                <div style=\"font:500 11.5px/1.45 ui-monospace,monospace;color:#8b8b86;text-wrap:pretty\">{{ currentRoutine.timing }}<\u002Fdiv>\n                <div style=\"margin-top:13px;display:flex;align-items:center;gap:10px\">\n                  <div style=\"flex:1;height:7px;background:#26262b;border-radius:9px;overflow:hidden\">\n                    <div style=\"width:{{ currentRoutine.progressPct }};height:100%;background:#19e3b1\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font:600 12px/1 ui-monospace,monospace;color:#f4f4f2\">{{ currentRoutine.progressText }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <sc-for list=\"{{ currentRoutine.blocks }}\" as=\"block\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:baseline;gap:8px;margin:18px 2px 7px\">\n                  <span style=\"font:700 11px/1 ui-monospace,monospace;letter-spacing:.14em;color:#f4f4f2\">{{ block.label }}<\u002Fspan>\n                  <sc-if value=\"{{ block.hasSub }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font:500 11px/1 ui-monospace,monospace;color:#6e6e69\">{{ block.subLabel }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"background:#141417;border:1px solid #1f1f24;border-radius:14px;padding:0 13px\">\n                  <sc-for list=\"{{ block.exercises }}\" as=\"ex\" hint-placeholder-count=\"3\">\n                    <div style=\"padding:13px 0;border-top:1px solid #1c1c20\">\n                      <div style=\"display:flex;gap:11px;align-items:flex-start\">\n                        <button onclick=\"{{ ex.onToggle }}\" style=\"{{ ex.checkStyle }}\">\n                          <sc-if value=\"{{ ex.showCheck }}\" hint-placeholder-val=\"{{ false }}\">\n                            <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 13l4 4L19 7\" stroke=\"#0b0b0d\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                          <\u002Fsc-if>\n                          <sc-if value=\"{{ ex.showCount }}\" hint-placeholder-val=\"{{ false }}\">\n                            <span style=\"width:20px;height:20px;border-radius:50%;background:#141417;display:flex;align-items:center;justify-content:center;font:700 9.5px/1 ui-monospace,monospace;color:#f4f4f2\">{{ ex.setText }}<\u002Fspan>\n                          <\u002Fsc-if>\n                        <\u002Fbutton>\n                        <div style=\"flex:1;min-width:0\">\n                          <div style=\"font-size:14.5px;color:#f4f4f2;line-height:1.35;font-weight:500;text-wrap:pretty\">{{ ex.name }}<\u002Fdiv>\n                          <div style=\"margin-top:4px;font:500 11.5px/1.4 ui-monospace,monospace;color:#8b8b86\">{{ ex.meta }}<\u002Fdiv>\n ont:600 10px/1 ui-monospace,monospace;color:#8b8b86\">{{ ex.unit }}<\u002Fspan>\n                          <\u002Fdiv>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n\n                      <sc-if value=\"{{ ex.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"margin-top:11px;padding:12px;background:#0f0f12;border:1px solid #1f1f24;border-radius:12px\">\n                          <div style=\"display:flex;gap:6px;padding:0 2px 7px;font:700 8.5px/1 ui-monospace,monospace;letter-spacing:.08em;color:#6e6e69\">\n                            <span style=\"width:30px;flex:none\">SERIE<\u002Fspan>\n                            <span style=\"width:56px;flex:none;text-align:center\">REPS<\u002Fspan>\n                            <span style=\"width:56px;flex:none;text-align:center\">KG<\u002Fspan>\n                            <span style=\"flex:1\">NOTA<\u002Fspan>\n                          <\u002Fdiv>\n                          <sc-for list=\"{{ ex.sets }}\" as=\"st\" hint-placeholder-count=\"3\">\n                            <div style=\"display:flex;gap:6px;align-items:center;margin-bottom:7px\">\n                              <span style=\"width:30px;flex:none;font:700 11px/1 ui-monospace,monospace;color:#8b8b86\">{{ st.label }}<\u002Fspan>\n                              <input type=\"text\" inputmode=\"decimal\" value=\"{{ st.reps }}\" onchange=\"{{ st.onReps }}\" placeholder=\"–\" style=\"width:56px;flex:none;text-align:center;background:#0d0d10;border:1px solid #2a2a2f;border-radius:7px;color:#f4f4f2;font:600 12.5px/1 ui-monospace,monospace;padding:7px 4px\">\n                              <input type=\"text\" inputmode=\"decimal\" value=\"{{ st.weight }}\" onchange=\"{{ st.onWeight }}\" placeholder=\"–\" style=\"width:56px;flex:none;text-align:center;background:#0d0d10;border:1px solid #2a2a2f;border-radius:7px;color:#19e3b1;font:600 12.5px/1 ui-monospace,monospace;padding:7px 4px\">\n                              <input type=\"text\" value=\"{{ st.comment }}\" onchange=\"{{ st.onComment }}\" placeholder=\"opcional\" style=\"flex:1;min-width:0;background:#0d0d10;border:1px solid #2a2a2f;border-radius:7px;color:#dededa;font:500 11.5px/1 -apple-system,sans-serif;padding:8px 8px\">\n                            <\u002Fdiv>\n                          <\u002Fsc-for>\n                          <textarea value=\"{{ ex.exComment }}\" onchange=\"{{ ex.onExComment }}\" placeholder=\"Comentario del ejercicio: técnica, dolor, fatiga, sensaciones...\" style=\"width:100%;height:58px;margin-top:5px;resize:vertical;background:#0d0d10;border:1px solid #2a2a2f;border-radius:9px;color:#dededa;font:500 12px/1.5 -apple-system,sans-serif;padding:10px\"><\u002Ftextarea>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n\n                  <sc-if value=\"{{ block.hasRounds }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"display:flex;align-items:center;gap:9px;padding:13px 0;border-top:1px solid #1c1c20\">\n                      <span style=\"font:700 10px/1 ui-monospace,monospace;letter-spacing:.1em;color:#8b8b86;flex:none\">VUELTAS<\u002Fspan>\n                      <div style=\"display:flex;gap:7px\">\n                        <sc-for list=\"{{ block.roundCells }}\" as=\"rc\" hint-placeholder-count=\"2\">\n                          <button onclick=\"{{ rc.onTap }}\" style=\"{{ rc.style }}\">{{ rc.label }}<\u002Fbutton>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n\n              <sc-if value=\"{{ currentRoutine.completed }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ currentRoutine.onComplete }}\" style=\"width:100%;margin-top:22px;padding:16px;border-radius:14px;background:rgba(25,227,177,0.1);border:1.5px solid #19e3b1;color:#19e3b1;font:600 14px/1 -apple-system,sans-serif;cursor:pointer\">Completado · toca para deshacer<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ currentRoutine.notCompleted }}\" hint-placeholder-val=\"{{ true }}\">\n                <button onclick=\"{{ currentRoutine.onComplete }}\" style=\"width:100%;margin-top:22px;padding:16px;border-radius:14px;background:#19e3b1;border:1.5px solid #19e3b1;color:#06241c;font:700 14px/1 -apple-system,sans-serif;cursor:pointer\">Marcar entrenamiento completo<\u002Fbutton>\n              <\u002Fsc-if>\n              <button onclick=\"{{ onGoDiaryToday }}\" style=\"width:100%;margin-top:9px;padding:14px;border-radius:14px;background:#141417;border:1px solid #232328;color:#dededa;font:600 12.5px/1 -apple-system,sans-serif;cursor:pointer\">Anotar en el diario de hoy →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ noRoutine }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin-top:60px;text-align:center;padding:0 20px\">\n              <div style=\"font-size:15px;color:#8b8b86;line-height:1.5;text-wrap:pretty\">Elige una rutina arriba para empezar la sesión de hoy.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ viewDiary }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"display:flex;align-items:center;gap:8px;margin:14px 0 10px\">\n            <button onclick=\"{{ onPrevWeek }}\" style=\"width:36px;height:36px;flex:none;border-radius:10px;background:#141417;border:1px solid #232328;color:#dededa;font:600 16px/1 ui-monospace,monospace;cursor:pointer\">‹<\u002Fbutton>\n            <div style=\"flex:1;text-align:center;font:600 11.5px/1 ui-monospace,monospace;color:#8b8b86\">{{ weekLabel }}<\u002Fdiv>\n            <button onclick=\"{{ onNextWeek }}\" style=\"width:36px;height:36px;f       <div style=\"flex:1;padding:13px;background:#141417;border:1px solid #1f1f24;border-radius:14px\">\n              <div style=\"font:700 10px/1 ui-monospace,monospace;letter-spacing:.12em;color:#8b8b86\">ENERGÍA<\u002Fdiv>\n              <div style=\"margin-top:7px;font:700 22px/1 ui-monospace,monospace;color:#7c83ff\">{{ energyText }}<\u002Fdiv>\n              <div style=\"display:flex;gap:3px;margin-top:9px\">\n                <sc-for list=\"{{ energyCells }}\" as=\"m\" hint-placeholder-count=\"10\">\n                  <button onclick=\"{{ m.onTap }}\" style=\"{{ m.style }}\"><\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin:24px 2px 8px\">\n            <span style=\"font:700 11px/1 ui-monospace,monospace;letter-spacing:.14em;color:#f4f4f2\">¿DÓNDE DUELE?<\u002Fspan>\n            <button onclick=\"{{ onClearPain }}\" style=\"background:none;border:none;color:#6e6e69;font:600 11px/1 ui-monospace,monospace;cursor:pointer\">Limpiar<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"padding:14px;background:#141417;border:1px solid #1f1f24;border-radius:16px\">\n            <div data-om-raster=\"1\">{{ bodyMap }}<\u002Fdiv>\n            <div style=\"display:flex;gap:14px;justify-content:center;margin-top:10px\">\n              <sc-for list=\"{{ painLegend }}\" as=\"l\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:10px;height:10px;border-radius:3px;background:{{ l.color }}\"><\u002Fspan><span style=\"font:600 10px/1 ui-monospace,monospace;color:#8b8b86\">{{ l.label }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasPain }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:13px;padding-top:13px;border-top:1px solid #1c1c20\">\n                <sc-for list=\"{{ painSummary }}\" as=\"p\" hint-placeholder-count=\"2\">\n                  <span style=\"{{ p.style }}\">{{ p.text }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"font:700 11px/1 ui-monospace,monospace;letter-spacing:.14em;color:#f4f4f2;margin:24px 2px 8px\">DURANTE EL ENTRENO<\u002Fdiv>\n          <textarea value=\"{{ duringNote }}\" onchange=\"{{ onDuring }}\" placeholder=\"Sensaciones durante la sesión: fuerza, dolor, técnica...\" style=\"width:100%;height:84px;resize:vertical;background:#141417;border:1px solid #1f1f24;border-radius:14px;color:#dededa;font:500 12.5px/1.5 -apple-system,sans-serif;padding:13px\"><\u002Ftextarea>\n\n          <div style=\"font:700 11px/1 ui-monospace,monospace;letter-spacing:.14em;color:#f4f4f2;margin:22px 2px 8px\">DESPUÉS DEL ENTRENO<\u002Fdiv>\n          <textarea value=\"{{ postNote }}\" onchange=\"{{ onPost }}\" placeholder=\"Cómo te sientes después: recuperación, dolor, ánimo...\" style=\"width:100%;height:84px;resize:vertical;background:#141417;border:1px solid #1f1f24;border-radius:14px;color:#dededa;font:500 12.5px/1.5 -apple-system,sans-serif;padding:13px\"><\u002Ftextarea>\n\n          <sc-if value=\"{{ hasDiaryHistory }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <div style=\"font:700 11px/1 ui-monospace,monospace;letter-spacing:.14em;color:#f4f4f2;margin:26px 2px 8px\">HISTORIAL<\u002Fdiv>\n              <sc-for list=\"{{ diaryHistory }}\" as=\"h\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ h.onTap }}\" style=\"width:100%;text-align:left;display:flex;gap:11px;align-items:flex-start;background:#141417;border:1px solid #1f1f24;border-radius:13px;padding:12px;margin-bottom:8px;cursor:pointer\">\n                  <div style=\"flex:none;text-align:center;width:38px\">\n                    <div sty :#7c83ff\">{{ statDiary }}<\u002Fdiv>\n              <div style=\"margin-top:7px;font:600 10px/1.3 ui-monospace,monospace;color:#8b8b86\">registros de diario<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"font:700 11px/1 ui-monospace,monospace;letter-spacing:.14em;color:#f4f4f2;margin:24px 2px 8px\">EVOLUCIÓN POR EJERCICIO<\u002Fdiv>\n          <sc-if value=\"{{ hasExEvo }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <sc-for list=\"{{ exEvo }}\" as=\"e\" hint-placeholder-count=\"3\">\n                <div style=\"background:#141417;border:1px solid #1f1f24;border-radius:14px;padding:14px;margin-bottom:9px\">\n                  <div style=\"display:flex;align-items:center;gap:8px\">\n                    <span style=\"font:700 8.5px/1 ui-monospace,monospace;letter-spacing:.1em;padding:3px 6px;border-radius:5px;color:#19e3b1;background:rgba(25,227,177,0.12);flex:none\">{{ e.tag }}<\u002Fspan>\n                    <span style=\"flex:1;min-width:0;font-size:13.5px;font-weight:600;color:#f4f4f2;text-wrap:pretty\">{{ e.name }}<\u002Fspan>\n                    <span style=\"{{ e.deltaStyle }}\">{{ e.delta }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ e.hasChart }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"display:flex;align-items:flex-end;gap:4px;height:42px;margin-top:12px\">\n                      <sc-for list=\"{{ e.bars }}\" as=\"b\" hint-placeholder-count=\"5\"><div style=\"{{ b.style }}\"><\u002Fdiv><\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div style=\"margin-top:11px;display:flex;justify-content:space-between;align-items:baseline\">\n                    <span style=\"font:600 11px/1 ui-monospace,monospace;color:#8b8b86\">Último<\u002Fspan>\n                    <span style=\"font:700 14px/1 ui-monospace,monospace;color:#f4f4f2\">{{ e.latest }}<\u002Fspan>\n                  <
