  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\">\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black\">\n<meta name=\"apple-mobile-web-app-title\" content=\"Hybrid 7\">\n<meta name=\"theme-color\" content=\"#0b0b0d\">\n<title>Hybrid 7<\u002Ftitle>\n<script src=\"8edeb250-5a6d-455d-ba71-d49205ebb6f0\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}\n  html,body{margin:0}\n  body{background:#0b0b0d}\n  input,button,textarea{font-family:inherit}\n  input[type=number]{-moz-appearance:textfield}\n  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}\n  ::placeholder{color:#56564f}\n  ::-webkit-scrollbar{width:0;height:0}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#0b0b0d;display:flex;justify-content:center;font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif\">\n  <div style=\"width:100%;max-width:460px;min-height:100vh;background:#0b0b0d;display:flex;flex-direction:column;position:relative\">\n\n    <div style=\"padding:16px 16px 12px;background:#0b0b0d;border-bottom:1px solid #161619\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center\">\n        <div style=\"font:700 11px/1 ui-monospace,monospace;letter-spacing:.16em;color:#8b8b86\">{{ planTitle }}<\u002Fdiv>\n        <div style=\"font:700 10.5px/1 ui-monospace,monospace;letter-spacing:.1em;color:#ff5a3c\">{{ streakText }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:11px;font-size:27px;font-weight:600;color:#f4f4f2;letter-spacing:-0.02em\">{{ headerTitle }}<\u002Fdiv>\n      <div style=\"margin-top:2px;font-size:13px;color:#8b8b86\">{{ headerSub }}<\u002Fdiv>\n      <sc-if value=\"{{ showStrip }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;justify-content:space-between;margin-top:15px\">\n          <sc-for list=\"{{ weekCells }}\" as=\"c\" hint-placeholder-count=\"7\">\n            <button onclick=\"{{ c.onTap }}\" style=\"background:none;border:none;padding:0;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer\">\n              <span style=\"{{ c.letterStyle }}\">{{ c.letter }}<\u002Fspan>\n              <span style=\"{{ c.circleStyle }}\">{{ c.num }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;overflow-y:auto;padding:4px 16px 28px\">\n\n      <sc-if value=\"{{ viewToday }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <div style=\"padding:14px;background:#141417;border:1px solid #232328;border-radius:16px;margin:10px 0 14px\">\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n              <sc-for list=\"{{ currentDay.focusTags }}\" as=\"tag\" hint-placeholder-count=\"3\">\n                <span style=\"font:600 10.5px/1 ui-monospace,monospace;color:#ff5a3c;background:rgba(255,90,60,0.1);border:1px solid rgba(255,90,60,0.25);padding:6px 9px;border-radius:999px\">{{ tag }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"margin-top:11px;font:500 11.5px/1.4 ui-monospace,monospace;color:#8b8b86\">{{ currentDay.timing }}<\u002Fdiv>\n            <div style=\"margin-top:13px;display:flex;align-items:center;gap:10px\">\n              <div style=\"flex:1;height:7px;background:#26262b;border-radius:9px;overflow:hidden\">\n                <div style=\"width:{{ currentDay.progressPct }};height:100%;background:#ff5a3c\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font:600 12px/1 ui-monospace,monospace;color:#f4f4f2\">{{ currentDay.progressText }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-for list=\"{{ currentDay.blocks }}\" as=\"block\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;align-items:baseline;gap:8px;margin:18px 2px 7px\">\n              <span style=\"font:700 11px/1 ui-monospace,monospace;letter-spacing:.14em;color:#f4f4f2\">{{ block.label }}<\u002Fspan>\n              <sc-if value=\"{{ block.hasSub }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font:500 11px/1 ui-monospace,monospace;color:#6e6e69\">{{ block.subLabel }}<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"background:#141417;border:1px solid #1f1f24;border-radius:14px;padding:0 13px\">\n              <sc-for list=\"{{ block.exercises }}\" as=\"ex\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;gap:11px;padding:13px 0;border-top:1px solid #1c1c20;align-items:flex-start\">\n                  <button onclick=\"{{ ex.onToggle }}\" style=\"{{ ex.checkStyle }}\">\n                    <sc-if value=\"{{ ex.showCheck }}\" hint-placeholder-val=\"{{ false }}\">\n                      <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 13l4 4L19 7\" stroke=\"#0b0b0d\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ ex.showCount }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span style=\"width:20px;height:20px;border-radius:50%;background:#141417;display:flex;align-items:center;justify-content:center;font:700 9.5px/1 ui-monospace,monospace;color:#f4f4f2\">{{ ex.setText }}<\u002Fspan>\n                    <\u002Fsc-if>\n                  <\u002Fbutton>\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"font-size:14.5px;color:#f4f4f2;line-height:1.35;font-weight:500;text-wrap:pretty\">{{ ex.name }}<\u002Fdiv>\n                    <div style=\"margin-top:4px;font:500 11.5px/1.4 ui  \\u00d7 6\\u20138 @31X1\", r:\"20s\", t:\"w\", p:\"40\\u201370\"},{n:\"Hip thrust\", d:\"4 \\u00d7 8\\u201310 @20X1\", r:\"20s\", t:\"w\", p:\"50\\u201390\"},{n:\"Hanging knee raise\", d:\"4 \\u00d7 10\\u201312\", r:\"60s\"}] },\n        { l:\"FINISHER\", x:[{n:\"AMRAP 10 min \\u2014 12 KB swing / 10 burpee / 40 single unders / 8 DB push press\", d:\"10 min\", r:\"\\u2014\", t:\"w\", p:\"KB 16\\u201318\"}] },\n        { l:\"COOLDOWN\", x:[{n:\"Walk + hip flexor stretch\", d:\"2 min\", r:\"\\u2014\"}] }\n      ]},\n      { name:\"Thursday\", short:\"Thu\", focus:[\"Mixed skill microdose\",\"Full-body density\",\"Threshold\"], timing:\"40 min \\u00b7 skill \\u2192 density \\u2192 threshold\", blocks:[\n        { l:\"WARM-UP\", x:[{n:\"Elliptical + band pull-apart + wrist prep + cossack squat\", d:\"6 min\", r:\"\\u2014\"}] },\n        { l:\"SKILL MIX\", x:[{n:\"Planche lean\", d:\"3 \\u00d7 10\\u201312 s\", r:\"20s\", t:\"h\", p:\"10\\u201312\"},{n:\"Tuck FL scap pull\", d:\"3 \\u00d7 5 reps\", r:\"20s\"},{n:\"MU transition / explosive pull-up\", d:\"3 \\u00d7 1\\u20132 reps\", r:\"45s\"}] },\n        { l:\"DENSITY\", x:[{n:\"DB incline press\", d:\"3 \\u00d7 10 @31X1\", r:\"20s\", t:\"w\", p:\"2\\u00d718\\u201324\"},{n:\"Neutral lat pulldown\", d:\"3 \\u00d7 10 @21X1\", r:\"20s\", t:\"w\", p:\"35\\u201355\"},{n:\"Leg curl machine\", d:\"3 \\u00d7 12 @21X1\", r:\"20s\", t:\"w\", p:\"12RM\"},{n:\"Leg extension machine\", d:\"3 \\u00d7 12 @21X1\", r:\"60s\", t:\"w\", p:\"12RM\"}] },\n        { l:\"THRESHOLD\", x:[{n:\"Treadmill intervals\", d:\"5 \\u00d7 90s hard / 30s easy\", r:\"\\u2014\", sub:\"Z4 \\u00b7 incline 2\\u20134%\"}] },\n        { l:\"COOLDOWN\", x:[{n:\"Walk + breathing\", d:\"2 min\", r:\"\\u2014\"}] }\n      ]},\n      { name:\"Friday\", short:\"Fri\", focus:[\"Hybrid benchmark\",\"Short savage finisher\"], timing:\"40 min \\u00b7 skill \\u2192 benchmark \\u2192 finisher\", blocks:[\n        { l:\"WARM-UP\", x:[{n:\"Bike/row easy + full dynamic mobilit blocks:[\n        { l:\"WARM-UP\", x:[{n:\"Walk/bike easy + gentle mobility\", d:\"8 min\", r:\"\\u2014\"}] },\n        { l:\"SKILL QUALITY\", x:[{n:\"3 rounds: tuck planche 8s / tuck FL 8s / 1 MU transition / 20s support hold\", d:\"3 \\u00d7 quality\", r:\"30\\u201340s\", sub:\"no fatigue\"}] },\n        { l:\"Z2 ENGINE\", x:[{n:\"12m treadmill incline + 12m bike + 11m row\", d:\"35 min\", r:\"\\u2014\", sub:\"65\\u201375% HRmax\"}] },\n        { l:\"PREHAB\", x:[{n:\"Wrist ext. curl + band face pull + Copenhagen plank + calf raise\", d:\"2 \\u00d7 15\\u201320 / 20s\", r:\"20\\u201330s\", sub:\"light\"}] },\n        { l:\"COOLDOWN\", x:[{n:\"Thoracic extension + breathing\", d:\"4 min\", r:\"\\u2014\"}] }\n      ]}\n    ]\n  };\n\n  ZONES = [\n    {z:\"Z2\", pct:\"65\\u201375%\", rpe:\"RPE 3\\u20134\", use:\"Long aerobic, recovery, sustainable fat loss\"},\n    {z:\"Z3\", pct:\"76\\u201384%\", rpe:\"RPE 5\\u20136\", use:\"Tempo / threshold, steady runs\"},\n    {z:\"Z4\", pct:\"85\\u201392%\", rpe:\"RPE 7\\u20138\", use:\"Long intervals, compromised running\"},\n    {z:\"Z5\", pct:\"93\\u201396%+\", rpe:\"RPE 8.5\\u201310\", use:\"VO\\u2082 / HIIT, finishers\"}\n  ];\n  GLOSSARY = [\n    {k:\"RPE 8\", v:\"~2 reps left in reserve\"},\n    {k:\"31X1\", v:\"3s eccentric, 1s pause, explosive concentric, 1s top\"},\n    {k:\"BW\", v:\"Bodyweight\"},\n    {k:\"RIR\", v:\"Reps in reserve\"}\n  ];\n\n  state = { view:\"today\", selDay:null, importText:\"\", importMsg:\"\", importOk:false, timerTotal:0, timerLeft:0, timerRunning:false };\n\n  log = this._loadLog();\n  plan = this._loadPlan();\n\n  _loadLog(){ try { const r = JSON.parse(localStorage.getItem(\"wapp_log\")); if(r && typeof r===\"object\") return { weights:r.weights||{}, holds:r.holds||{}, sessions:r.sessions||{}, bodyweight:r.bodyweight||{} }; } catch(e){} return { weights:{}, holds:{}, sessions:{}, bodyweight:{} }; }\n  _loadPlan(){ try { const r = JSON.parse(localStorage.getItem(\"wapp_plan\")); if(r && Array.isArray(r.days) && r.days.length) return r; } catch(e){} return this.SEED; }\n  save(){ try { localStorage.setItem(\"wapp_log\", JSON.stringify(this.log)); } catch(e){} }\n\n  iso(d){ const z=n=>String(n).padStart(2,\"0\"); return d.getFullYear()+\"-\"+z(d.getMonth()+1)+\"-\"+z(d.getDate()); }\n  dates(){\n    const t = new Date(); t.setHours(0,0,0,0);\n    const ti = (t.getDay()+6)%7;\n    const mon = new Date(t); mon.setDate(t.getDate()-ti);\n    const wd = []; for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i); wd.push(d); }\n    return { today:t, todayIndex:ti, weekDates:wd };\n  }\n  streak(){\n    const t = new Date(); t.setHours(0,0,0,0); let s=0;\n    for(let k=0;k<400;k++){ const d=new Date(t); d.setDate(t.getDate()-k); const ss=this.log.sessions[this.iso(d)];\n      if(ss && ss.complete) s++; else if(k>0) break; }\n    return s;\n  }\n  wkey(di,name){ return di+\"|\"+name; }\n  setVal(bucket,key,v){ if(v===\"\"||v==null) delete this.log[bucket][key]; else this.log[bucket][key]=v; this.save(); }\n  parseSets(d){ if(!d) return 1; const m=String(d).match(/^\\s*(\\d+)\\s*\\u00d7/); if(m){ const n=parseInt(m[1],10); if(n>0&&n<=12) return n; } return 1; }\n  toggleEx(iso,exKey,nSets,restSec){ nSets=nSets||1; const s=this.log.sessions[iso]||{ex:{},complete:false}; if(!s.ex) s.ex={}; const raw=s.ex[exKey]; const cur = raw===true?nSets:(typeof raw===\"number\"?raw:0); const next = cur>=nSets ? 0 : cur+1; if(next===0) delete s.ex[exKey]; else s.ex[exKey]=next; this.log.sessions[iso]=s; this.save(); if(next>0 && restSec>0) this.startRest(restSec); else this.forceUpdate(); }\n  toggleComplete(iso){ const s=this.log.sessions[iso]||{ex:{},complete:false}; s.complete=!s.complete; this.log.sessions[iso]=s; this.save(); this.forceUpdate(); }\n\n  // --- rest timer ---\n  parseSec(r){ if(!r) return 0; const m=String(r).match(/(\\d+)/); return m?parseInt(m[1],10):0; }\n  fmt(s){ s=Math.max(0,s|0); const m=Math.floor(s/60), ss=s%60; return m+\":\"+String(ss).padStart(2,\"0\"); }\n  clearTimer(){ if(this._tick){ clearInterval(this._tick); this._tick=null; } }\n  componentWillUnmount(){ this.clearTimer(); }\n  beep(){ try { const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return; const ac=new AC(); const tone=(f,t)=>{ const o=ac.createOscillator(), g=ac.createGain(); o.connect(g); g.connect(ac.destination); o.frequency.value=f; g.gain.setValueAtTime(0.0001,ac.currentTime+t); g.gain.exponentialRampToValueAtTime(0.18,ac.currentTime+t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+t+0.22); o.start(ac.currentTime+t); o.stop(ac.currentTime+t+0.24); }; tone(880,0); tone(1245,0.24); } catch(e){} }\n  tick(){ const left=this.state.timerLeft-1; if(left<=0){ this.clearTimer(); this.beep(); try{ navigator.vibrate&&navigator.vibrate([130,80,130]); }catch(e){} this.setState({ timerLeft:0, timerRunning:false }); } else this.setState({ timerLeft:left }); }\n  startRest(sec){ if(!sec) return; this.clearTimer(); this.setState({ timerTotal:sec, timerLeft:sec, timerRunning:true }); this._tick=setInterval(()=>this.tick(),1000); }\n  toggleRest(){ if(this.state.timerLeft<=0){ this.startRest(this.state.timerTotal); return; } if(this.state.timerRunning){ this.clearTimer(); this.setState({ timerRunning:false }); } else { this._tick=setInterval(()=>this.tick(),1000); this.setState({ timerRunning:true }); } }\n  addRest(d){ this.setState(s=>({ timerLeft:Math.max(0,s.timerLeft+d), timerTotal:Math.max(s.timerTotal, s.timerLeft+d) })); }\n  closeRest(){ this.clearTimer(); this.setState({ timerTotal:0, timerLeft:0, timerRunning:false }); }\n\n  schemaText(){\n    return [\n\"Update my workout plan. Return ONLY valid JSON in exactly this shape (no markdown, no commentary):\",\n\"\",\n'{',\n'  \"title\": \"Hybrid 7\",',\n'  \"days\": [',\n'    {',\n'      \"name\": \"Monday\", \"short\": \"Mon\",',\n'      \"focus\": [\"Planche priority\", \"Push / lower density\", \"HIIT\"],',\n'      \"timing\": \"40 min \\u00b7 warm-up \\u2192 skill \\u2192 density \\u2192 HIIT\",',\n'      \"blocks\": [',\n'        { \"l\": \"SKILL\", \"x\": [',\n'          { \"n\": \"Tuck planche hold\", \"d\": \"4 \\u00d7 8\\u201310 s\", \"r\": \"40s\", \"t\": \"h\", \"p\": \"8\\u201310\" },',\n'          { \"n\": \"Goblet squat\", \"d\": \"4 \\u00d7 10\", \"r\": \"20s\", \"t\": \"w\", \"p\": \"20\\u201330\" }',\n'        ] }',\n'      ]',\n'    }',\n'  ]',\n'}',\n\"\",\n\"Rules:\",\n\"- Exactly 7 day objects, Monday\\u2192Sunday.\",\n'- \"t\": \"w\" shows a kg weight input, \"h\" shows a seconds hold input; omit \"t\" for no input.',\n'- \"p\" = suggested load / target (shown as the input placeholder).',\n'- \"sub\" is optional extra note on an exercise (e.g. \"RPE 9\").',\n\"- Keep exercise names similar to before so my logged numbers carry over.\"\n    ].join(\"\\n\");\n  }\n  copy(text,msg){ try { navigator.clipboard.writeText(text); } catch(e){} this.setState({ importMsg:msg, importOk:true }); }\n  applyImport(){\n    try {\n      const p = JSON.parse(this.state.importText);\n      if(!p || !Array.isArray(p.days) || !p.days.length) throw new Error(\"missing days[]\");\n      try { localStorage.setItem(\"wapp_plan\", JSON.stringify(p)); } catch(e){}\n      this.plan = p;\n      this.setState({ importText:\"\", importMsg:\"Plan updated \\u2713\", importOk:true });\n    } catch(e){ this.setState({ importMsg:\"Invalid JSON: \"+e.message, importOk:false }); }\n  }\n  resetPlan(){ try { localStorage.removeItem(\"wapp_plan\"); } catch(e){} this.plan=this.SEED; this.setState({ importMsg:\"Reset to default plan\", importOk:true }); }\n\n  renderVals(){\n    const A=\"#ff5a3c\";\n    const td = this.dates();\n    const selDay = this.state.selDay==null ? td.todayIndex : this.state.selDay;\n    const view = this.state.view;\n    const day = this.plan.days[selDay] || this.plan.days[0];\n    const selDate = td.weekDates[selDay];\n    const selIso = this.iso(selDate);\n    const sess = this.log.sessions[selIso] || { ex:{}, complete:false };\n\n    const CHK_BASE = \"width:24px;height:24px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;margin-top:1px;cursor:pointer;padding:0;\";\n    const checkOn = CHK_BASE+\"background:\"+A+\";border:1px solid \"+A;\n    const checkOff = CHK_BASE+\"background:transparent;border:1.5px solid #3a3a40\";\n\n    let total=0, done=0;\n    const blocks = (day.blocks||[]).map((bl,bi)=>({\n      label: bl.l, subLabel: bl.sub||\"\", hasSub: !!bl.sub,\n      exercises: (bl.x||[]).map((x,xi)=>{\n        total++;\n        const exKey = bi+\"|\"+xi+\"|\"+x.n;\n        const nSets = this.parseSets(x.d);\n        const multi = nSets>1;\n        const raw = sess.ex && sess.ex[exKey];\n        const doneSets = raw===true ? nSets : (typeof raw===\"number\" ? raw : 0);\n        const allDone = doneSets>0 && doneSets>=nSets;\n        if(allDone) done++;\n        const isW = x.t===\"w\", isH = x.t===\"h\";\n        const key = this.wkey(selDay, x.n);\n        const val = isW ? (this.log.weights[key] ?? \"\") : isH ? (this.log.holds[key] ?? \"\") : \"\";\n        let meta = x.d;\n        if(x.sub) meta += \"  \\u00b7  \"+x.sub;\n        const restSec = this.parseSec(x.r);\n        const hasRest = !!(x.r && x.r!==\"\\u2014\" && restSec>0);\n        const BASE=\"border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;margin-top:1px;cursor:pointer;padding:0;\";\n        let checkStyle, showCheck=false, showCount=false;\n        if(allDone){ checkStyle=\"width:24px;height:24px;\"+BASE+\"background:\"+A+\";border:1px solid \"+A+\";\"; showCheck=true; }\n        else if(multi){ const deg=(doneSets/nSets)*360; checkStyle=\"width:26px;height:26px;\"+BASE+\"background:conic-gradient(\"+A+\" \"+deg+\"deg,#2c2c32 \"+deg+\"deg);border:none;\"; showCount=true; }\n        else { checkStyle=\"width:24px;height:24px;\"+BASE+\"background:transparent;border:1.5px solid #3a3a40;\"; }\n        return {\n          name:x.n, meta, done:allDone, multi, showCheck, showCount, setText:String(doneSets),\n          checkStyle,\n          hasInput: isW||isH, unit: isW?\"kg\":\"s\", placeholder: x.p||\"\", value: String(val),\n          hasRest, restLabel: x.r||\"\", onRest: ()=>this.startRest(restSec),\n          onToggle: ()=>this.toggleEx(selIso, exKey, nSets, restSec),\n          onValue: (e)=>this.setVal(isW?\"weights\":\"holds\", key, e.target.value)\n        };\n      })\n    }));\n\n    const currentDay = {\n      focusTags: day.focus||[], timing: day.timing||\"\",\n      blocks,\n      progressPct: total? Math.round(done/total*100)+\"%\" : \"0%\",\n      progressText: done+\" / \"+total,\n      completed: !!sess.complete, notCompleted: !sess.complete,\n      onComplete: ()=>this.toggleComplete(selIso)\n    };\n\n    const circBase = \"width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:600 13px/1 ui-monospace,monospace;\";\n    const weekCells = td.weekDates.map((d,i)=>{\n      const dIso=this.iso(d); const dn=this.log.sessions[dIso]&&this.log.sessions[dIso].complete;\n      const isT=i===td.todayIndex; const isSel=i===selDay;\n      let cs=circBase;\n      if(dn) cs+=\"background:\"+A+\";border:1px solid \"+A+\";color:#0b0b0d;\";\n      else if(isT) cs+=\"background:transparent;border:1.5px solid \"+A+\";color:\"+A+\";\";\n      else cs+=\"background:transparent;border:1px solid #2a2a2f;color:#8b8b86;\";\n      if(isSel) cs+=\"box-shadow:0 0 0 3px rgba(255,90,60,0.16);\";\n      return { num:d.getDate(), letter:(this.plan.days[i].short||\"\")[0], circleStyle:cs,\n        letterStyle:\"font:600 10px/1 ui-monospace,monospace;color:\"+(isT?A:\"#6e6e69\"),\n        onTap:()=>this.setState({ view:\"today\", selDay:i }) };\n    });\n\n    const weekList = this.plan.days.map((d,i)=>{\n      const dIso=this.iso(td.weekDates[i]); const dn=this.log.sessions[dIso]&&this.log.sessions[dIso].complete;\n      const isT=i===td.todayIndex;\n      let ds=\"width:38px;height:38px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font:700 13px/1 ui-monospace,monospace;\";\n      if(dn) ds+=\"background:\"+A+\";color:#0b0b0d;\";\n      else ds+=\"background:#1d1d21;border:1px solid #2a2a2f;color:\"+(isT?A:\"#8b8b86\")+\";\";\n      return { letter:(d.short||\"\")[0], name:d.name, focus:(d.focus||[]).join(\"  \\u00b7  \"), isToday:isT, dotStyle:ds,\n        onTap:()=>this.setState({ view:\"today\", selDay:i }) };\n    });\n\n    // progress rows\n    const weightRows=[], holdRows=[];\n    this.plan.days.forEach((d,di)=>{ (d.blocks||[]).forEach(bl=>{ (bl.x||[]).forEach(x=>{\n      if(x.t===\"w\"){ const v=this.log.weights[this.wkey(di,x.n)]; weightRows.push({ day:(d.short||\"\").toUpperCase(), name:x.n, display: v?(v+\" kg\"):\"\\u2014\", valStyle:\"font:600 13px/1 ui-monospace,monospace;flex:none;color:\"+(v?A:\"#5b5b57\") }); }\n      if(x.t===\"h\"){ const v=this.log.holds[this.wkey(di,x.n)]; holdRows.push({ day:(d.short||\"\").toUpperCase(), name:x.n, display: v?(v+\" s\"):\"\\u2014\", valStyle:\"font:600 13px/1 ui-monospace,monospace;flex:none;color:\"+(v?A:\"#5b5b57\") }); }\n    }); }); });\n\n    // 21-day completion strip\n    const compStrip=[]; let compDone=0;\n    for(let k=20;k>=0;k--){ const d=new Date(td.today); d.setDate(td.today.getDate()-k); const ss=this.log.sessions[this.iso(d)]; const c=ss&&ss.complete; if(c) compDone++;\n      compStrip.push({ style:\"width:10px;height:10px;border-radius:3px;\"+(c?(\"background:\"+A):\"background:#26262b\") }); }\n\n    // header\n    let headerTitle, headerSub, showStrip=false;\n    if(view===\"today\"){ headerTitle=day.name; const dl=selDate.toLocaleDateString(\"en-GB\",{day:\"numeric\",month:\"short\"}); headerSub=dl+(selDay===td.todayIndex?\"  \\u00b7  Today\":\"\"); showStrip=true; }\n    else if(view===\"week\"){ headerTitle=\"This week\"; headerSub=this.plan.title; showStrip=true; }\n    else if(view===\"progress\"){ headerTitle=\"Progress\"; headerSub=\"Weights, holds & consistency\"; }\n    else { headerTitle=\"Plan\"; headerSub=\"Update & reference\"; }\n\n    // bodyweight\n    const todayIso = this.iso(td.today);\n    const bw = this.log.bodyweight||{};\n    const bwArr = Object.keys(bw).sort().map(k=>({iso:k, v:parseFloat(bw[k])})).filter(e=>!isNaN(e.v));\n    const recent = bwArr.slice(-12);\n    let bwLatest=\"\\u2014\", bwSub=\"No entries yet\", bwDelta=\"\", bwDeltaStyle=\"font:700 13px/1 ui-monospace,monospace;color:#5b5b57\", bwHasChart=false, bwBars=[];\n    if(recent.length){\n      const last=recent[recent.length-1];\n      bwLatest=last.v+\" kg\";\n      bwSub=\"Last \\u00b7 \"+new Date(last.iso).toLocaleDateString(\"en-GB\",{day:\"numeric\",month:\"short\"});\n      if(recent.length>1){\n        const diff=last.v-recent[0].v;\n        const sign=diff>0?\"+\":(diff<0?\"\\u2212\":\"\");\n        bwDelta=sign+Math.abs(diff).toFixed(1)+\" kg \\u00b7 \"+recent.length+\" logs\";\n        bwDeltaStyle=\"font:700 12px/1 ui-monospace,monospace;text-align:right;color:\"+(diff<=0?\"#6fcf97\":\"#ff8a3c\");\n        const mn=Math.min(...recent.map(e=>e.v)), mx=Math.max(...recent.map(e=>e.v)), rng=(mx-mn)||1;\n        bwHasChart=true;\n        bwBars=recent.map(e=>({ style:\"flex:1;min-width:5px;background:\"+A+\";border-radius:3px 3px 0 0;opacity:0.85;height:\"+(14+(e.v-mn)/rng*40)+\"px\" }));\n      }\n    }\n    const bwToday = bw[todayIso]!=null ? String(bw[todayIso]) : \"\";\n    const onBw=(e)=>{ const v=e.target.value; if(!this.log.bodyweight) this.log.bodyweight={}; if(v===\"\") delete this.log.bodyweight[todayIso]; else this.log.bodyweight[todayIso]=v; this.save(); this.forceUpdate(); };\n\n    // rest timer view-model\n    const tActive=this.state.timerTotal>0;\n    const tTotal=this.state.timerTotal||1, tLeft=this.state.timerLeft;\n    const tDone=tLeft<=0;\n    const tDeg=Math.max(0,Math.min(360,(tLeft/tTotal)*360));\n    const ringCol=tDone?\"#6fcf97\":A;\n\n    const s = this.streak();\n    const navText=(a)=>\"font:600 10.5px/1 -apple-system,sans-serif;letter-spacing:.02em;color:\"+(a?A:\"#6e6e69\");\n    const navDot=(a)=>\"width:5px;height:5px;border-radius:50%;background:\"+(a?A:\"transparent\");\n\n    return {\n      planTitle:(this.plan.title||\"Workout\").toUpperCase(),\n      streakText: s>0 ? s+\" DAY STREAK\" : \"\",\n      headerTitle, headerSub, showStrip, weekCells,\n      viewToday:view===\"today\", viewWeek:view===\"week\", viewProgress:view===\"progress\", viewPlan:view===\"plan\",\n      currentDay, weekList, weightRows, holdRows,\n      noteValue: sess.note||\"\", onNote:(e)=>{ const ns=this.log.sessions[selIso]||{ex:{},complete:false}; ns.note=e.target.value; this.log.sessions[selIso]=ns; this.save(); this.forceUpdate(); },\n      bwLatest, bwSub, bwDelta, bwDeltaStyle, bwHasChart, bwBars, bwToday, onBw,\n      timerActive:tActive, timerMMSS:this.fmt(tLeft),\n      timerRingStyle:\"width:52px;height:52px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;background:conic-gradient(\"+ringCol+\" \"+tDeg+\"deg,#2c2c32 \"+tDeg+\"deg)\",\n      timerStatus: tDone?\"Done \\u2014 next set\":(this.state.timerRunning?\"Counting down\":\"Paused\"),\n      timerToggleLabel: tDone?\"\\u21bb\":(this.state.timerRunning?\"II\":\"\\u25b6\"),\n      onRestMinus:()=>this.addRest(-15), onRestPlus:()=>this.addRest(15), onRestToggle:()=>this.toggleRest(), onRestClose:()=>this.closeRest(),\n      compStrip, compSummary: compDone+\" sessions in the last 21 days\",\n      planFullTitle:this.plan.title||\"Workout\", planMeta:(this.plan.days.length)+\" days \\u00b7 \"+(this.plan.subtitle||\"hybrid split\"),\n      zones:this.ZONES, glossary:this.GLOSSARY,\n      importText:this.state.importText, onImportChange:(e)=>this.setState({ importText:e.target.value }),\n      importMsg:this.state.importMsg, hasMsg:!!this.state.importMsg,\n      msgStyle:\"margin-top:10px;font:500 11.5px/1.4 ui-monospace,monospace;text-wrap:pretty;color:\"+(this.state.importOk?\"#6fcf97\":\"#ff5a3c\"),\n      onApplyImport:()=>this.applyImport(), onCopySchema:()=>this.copy(this.schemaText(),\"AI prompt copied to clipboard \\u2713\"),\n      onCopyPlan:()=>this.copy(JSON.stringify(this.plan,null,2),\"Current plan copied to clipboard \\u2713\"), onReset:()=>this.resetPlan(),\n      onNavToday:()=>this.setState({ view:\"today\", selDay:null }), onNavWeek:()=>this.setState({ view:\"week\" }),\n      onNavProgress:()=>this.setState({ view:\"progress\" }), onNavPlan:()=>this.setState({ view:\"plan\" }),\n      navTextToday:navText(view===\"today\"), navTextWeek:navText(view===\"week\"), navTextProgress:navText(view===\"progress\"), navTextPlan:navText(view===\"plan\"),\n      navDotToday:navDot(view===\"today\"), navDotWeek:navDot(view===\"week\"), navDotProgress:navDot(view===\"progress\"), navDotPlan:navDot(view===\"plan\")\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
